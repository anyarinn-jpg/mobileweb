<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Counter App - Android UI Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;800&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-green: #39FF14;
            --electric-cyan: #00F5FF;
            --hot-coral: #FF4757;
            --deep-purple: #0D0D1A;
            --mid-dark: #12122B;
            --card-dark: #1A1A3E;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.4);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(57, 255, 20, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(57, 255, 20, 0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scanline {
            0% {
                transform: translateY(-100%);
            }

            100% {
                transform: translateY(100vh);
            }
        }

        @keyframes neon-flicker {

            0%,
            19%,
            21%,
            23%,
            25%,
            54%,
            56%,
            100% {
                opacity: 1;
            }

            20%,
            24%,
            55% {
                opacity: 0.8;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--deep-purple);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(57, 255, 20, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(57, 255, 20, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Scanline effect */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(57, 255, 20, 0.3), transparent);
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Ambient glow blobs */
        .bg-blob-1 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(57, 255, 20, 0.06) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-blob-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.05) 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
            pointer-events: none;
            z-index: 0;
        }

        /* Header Section */
        .header {
            background: var(--card-dark);
            padding: 30px 40px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 50px;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeSlideUp 0.6s ease both;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-green), var(--electric-cyan), var(--hot-coral));
        }

        .header::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(57, 255, 20, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .header h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, rgba(57, 255, 20, 0.9) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .student-info {
            color: rgba(255, 255, 255, 0.5);
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Container for phones */
        .phones-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Android Phone Frame */
        .phone-frame {
            width: 320px;
            height: 640px;
            background: #0A0A1A;
            border-radius: 40px;
            padding: 12px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.08),
                0 30px 80px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(57, 255, 20, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
            animation: float 6s ease-in-out infinite;
        }

        .phone-frame:nth-child(1) {
            animation-delay: 0s;
        }

        .phone-frame:nth-child(2) {
            animation-delay: -2s;
        }

        .phone-frame:nth-child(3) {
            animation-delay: -4s;
        }

        .phone-frame:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow:
                0 0 0 1px rgba(57, 255, 20, 0.3),
                0 40px 100px rgba(0, 0, 0, 0.7),
                0 0 80px rgba(57, 255, 20, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        /* Camera notch */
        .phone-frame::before {
            content: '';
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
            z-index: 10;
        }

        /* Phone Screen */
        .phone-screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
        }

        .phone-screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Status Bar */
        .status-bar {
            background: #4CAF50;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            color: white;
            font-size: 12px;
        }

        /* App Header */
        .app-header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        /* Screen 1: Start Screen */
        .start-screen {
            padding: 30px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: calc(100% - 25px);
        }

        .app-logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .app-title {
            color: white;
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .start-button {
            background: white;
            color: #764ba2;
            padding: 18px 50px;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            margin-top: 40px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }

        .start-button:hover {
            transform: translateY(-3px);
        }

        /* Screen 2: Counting Screen */
        .counting-screen {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            height: calc(100% - 25px);
            padding: 30px;
            text-align: center;
        }

        .exercise-name {
            color: white;
            font-size: 24px;
            margin-top: 20px;
            font-weight: bold;
        }

        .counter-circle {
            width: 180px;
            height: 180px;
            border: 8px solid white;
            border-radius: 50%;
            margin: 40px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .counter-number {
            color: white;
            font-size: 72px;
            font-weight: bold;
        }

        .timer {
            color: white;
            font-size: 20px;
            margin: 20px 0;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .control-btn {
            padding: 15px 30px;
            border: 3px solid white;
            background: transparent;
            color: white;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: white;
            color: #f5576c;
        }

        /* Screen 3: Statistics Screen */
        .stats-screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: calc(100% - 25px);
            padding: 30px;
        }

        .complete-icon {
            width: 80px;
            height: 80px;
            background: #4CAF50;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .complete-text {
            color: white;
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .stats-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .stat-label {
            color: #666;
            font-size: 16px;
        }

        .stat-value {
            color: #764ba2;
            font-size: 18px;
            font-weight: bold;
        }

        .finish-button {
            background: white;
            color: #764ba2;
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 30px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        /* Screen Labels */
        .screen-label {
            text-align: center;
            margin-top: 20px;
            font-family: 'Kanit', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            position: relative;
        }

        .screen-label::before {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 2px;
            background: var(--neon-green);
            border-radius: 2px;
            opacity: 0.6;
        }

        /* Phone wrapper for animation staggering */
        .phones-container>div {
            animation: fadeSlideUp 0.6s ease both;
        }

        .phones-container>div:nth-child(1) {
            animation-delay: 0.15s;
        }

        .phones-container>div:nth-child(2) {
            animation-delay: 0.3s;
        }

        .phones-container>div:nth-child(3) {
            animation-delay: 0.45s;
        }

        .video-section {
            margin-top: 60px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .video-section h2 {
            color: white;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .video-section video {
            width: 800px;
            max-width: 90%;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .phones-container {
                flex-direction: column;
                align-items: center;
            }

            .phone-frame {
                animation: none;
            }
        }
    </style>
</head>

<body>
    <!-- Background elements -->
    <div class="bg-blob-1"></div>
    <div class="bg-blob-2"></div>

    <!-- Header Section -->
    <div class="header">
        <h1>แบบฝึกหัด 9 Ionic + Mobile Phone Sensors</h1>
        <div class="student-info">

        </div>
    </div>


    <div class="phones-container">
        <div>
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="img/645785663_927425966505027_8043304832052071147_n.jpg" alt="">

        </div>


        <div>
            <div class="phone-frame">
                <div class="phone-screen">

                </div>

            </div>
            <div class="screen-label">ขณะกำลังนับ</div>
        </div>

        <div>
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="img/641673875_1286190913415268_9183654530687462521_n.jpg" alt="">
                </div>

            </div>
            <div class="screen-label">หน้าแสดงสถิติเมื่อจบ</div>
        </div>

        <!-- Video Section -->
        <div class="video-section">
            <h2>วิดีโอการทำงานของแอป</h2>

            <video controls>

    </div>

</body>

</html>
