<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 08 — Ionic + Firebase AI (Gemini) (Vue)</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=IBM+Plex+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #7c3aed;
      --light-blue: #ede9fe;
      --text-dark: #1a0a2e;
      --text-mid: #3b2060;
      --accent: #7c3aed;
      --bg: #f5f0ff;
      --card-bg: #ffffff;
      --section-title: #6d28d9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', 'IBM Plex Sans Thai', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #ede9fe 0%, #f3eeff 60%, #fdf4ff 100%);
      padding: 48px 24px 40px;
      text-align: center;
      border-bottom: 1px solid #c4b5fd;
    }

    .header h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      margin-bottom: 16px;
    }

    .header .student-info {
      display: inline-block;
      font-size: 1rem;
      font-weight: 700;
      color: var(--blue);
      border-bottom: 2px solid var(--blue);
      padding-bottom: 2px;
    }

    /* CONTENT */
    .content {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px 20px;
    }

    /* SECTION */
    .section {
      margin-bottom: 48px;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--section-title);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 2px;
      background: linear-gradient(to right, #7c3aed 0%, transparent 100%);
    }

    /* IMAGES */
    .section img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(124,58,237,0.15);
      display: block;
    }

    /* GITHUB BUTTON SECTION */
    .github-section {
      max-width: 860px;
      margin: 0 auto;
      padding: 8px 20px 56px;
      display: flex;
      justify-content: center;
    }

    .btn-github {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #1a0a2e;
      color: #e2e8f0;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Sarabun', sans-serif;
      border: 1.5px solid #7c3aed;
      box-shadow: 0 4px 20px rgba(124,58,237,0.25);
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .btn-github:hover {
      background: #7c3aed;
      color: #fff;
      box-shadow: 0 8px 32px rgba(124,58,237,0.45);
      transform: translateY(-2px);
    }

    .btn-github svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 28px 20px;
      font-size: 0.85rem;
      color: #888;
      border-top: 1px solid #d8b4fe;
      background: #f3eeff;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header { animation: fadeUp 0.5s ease both; }
    .section { animation: fadeUp 0.5s ease 0.1s both; }
    .github-section { animation: fadeUp 0.5s ease 0.25s both; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <h1>Lab 08 — Ionic + Firebase AI (Gemini) (Vue)</h1>
    <span class="student-info">นางสาวอัญรินทร์ นิธิโพธิพงศ์ | 673380023-2</span>
  </div>
